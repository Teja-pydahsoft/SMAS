# Fly.io config for SMAS AI server
# Deploy from ai-server/: fly launch / fly deploy

# Use the SAME name here as in the Fly dashboard "App name" field
app = "teja-smas-ai"
primary_region = "bom"

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "8000"
  INDEX_DIR = "/data"
  INSIGHTFACE_MODEL = "buffalo_s"
  DET_SIZE = "320,320"
  CPU_THREADS = "2"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "60s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "10s"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1

# Uncomment after creating the volume (Fly dashboard → Storage → Create volume,
# name: smas_ai_data, region: bom, size: 1 GB). Required for persistent face index.
# [mounts]
#   source = "smas_ai_data"
#   destination = "/data"
