# Render Blueprint — SMAS Backend only
# AI server is on Hugging Face: https://tejaPydahSoft-teja-smas-ai.hf.space
#
# Deploy: Render → New Blueprint → connect Teja-pydahsoft/SMAS
# Then set MONGODB_URI, AI_SERVER_URL, FRONTEND_URL in the dashboard.

services:
  - type: web
    name: smas-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    # IMPORTANT: /api/ping is DB/AI-free. Never point this at /api/health —
    # that endpoint contacts the AI server and a sleeping HF space would make
    # Render mark the instance unhealthy and restart it.
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      # Keep V8 heap under the 512MB free-tier container limit to avoid OOM kills
      - key: NODE_OPTIONS
        value: --max-old-space-size=400
      - key: HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: AI_SERVER_URL
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SUPER_ADMIN_USERNAME
        value: superadmin
      - key: SUPER_ADMIN_PASSWORD
        generateValue: true
      - key: UPLOAD_DIR
        value: uploads
      - key: FACE_MATCH_THRESHOLD
        value: "0.42"
      - key: MIN_MATCH_MARGIN
        value: "0.05"
      - key: SEARCH_TOP_K
        value: "5"
      - key: FACE_EMBEDDING_SIZE
        value: "512"
      # Web push (overstay alerts) — npx web-push generate-vapid-keys
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_SUBJECT
        value: mailto:admin@sams.local
