# Render Blueprint — SMAS Backend + AI Server
# https://render.com/docs/blueprint-spec
#
# Deploy: connect this GitHub repo in Render → New Blueprint → select render.yaml
# Set MONGODB_URI, AI_SERVER_URL, and FRONTEND_URL in the Render dashboard after deploy.
#
# AI server on Render free tier (512 MB) may OOM with InsightFace — if so, use
# Hugging Face Spaces instead: see deploy/AI-HOSTING.md

services:
  - type: web
    name: smas-ai-server
    runtime: docker
    plan: free
    rootDir: ai-server
    healthCheckPath: /health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 8000
      - key: INDEX_DIR
        value: /tmp/data
      - key: INSIGHTFACE_MODEL
        value: buffalo_s
      - key: DET_SIZE
        value: 320,320
      - key: CPU_THREADS
        value: "2"

  - type: web
    name: smas-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: MONGODB_URI
        sync: false
      - key: AI_SERVER_URL
        sync: false
        # If using Render AI service from this blueprint, set to:
        # https://smas-ai-server.onrender.com
        # Or use Hugging Face: https://YOUR-SPACE.hf.space (see deploy/AI-HOSTING.md)
      - key: FRONTEND_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: SUPER_ADMIN_USERNAME
        value: superadmin
      - key: SUPER_ADMIN_PASSWORD
        generateValue: true
      - key: UPLOAD_DIR
        value: uploads
      - key: FACE_MATCH_THRESHOLD
        value: "0.42"
      - key: MIN_MATCH_MARGIN
        value: "0.05"
      - key: SEARCH_TOP_K
        value: "5"
      - key: FACE_EMBEDDING_SIZE
        value: "512"
